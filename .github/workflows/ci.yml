name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  web_and_worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm typecheck

  api:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    env:
      KALPZERO_JWT_SECRET: test-secret-value-with-32-characters!!
      KALPZERO_ENCRYPTION_KEY: test-encryption-key-with-32-chars!
      KALPZERO_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
      KALPZERO_MONGO_URL: mongodb://localhost:27017/test
      KALPZERO_REDIS_URL: redis://localhost:6379/0
      KALPZERO_PUBLIC_WEB_URL: http://localhost:3000
      KALPZERO_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest
