name: Deploy Live

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-live
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout latest repository state
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate deploy path
        shell: bash
        run: |
          set -euo pipefail
          [[ -d "/mnt/data/kalpzero-enterprise" ]] || { echo "Missing deploy path /mnt/data/kalpzero-enterprise"; exit 1; }

      - name: Show runner context
        shell: bash
        run: |
          set -euo pipefail
          hostname
          whoami
          pwd

      - name: Deploy live repo
        shell: bash
        env:
          TARGET_ROOT: /mnt/data/kalpzero-enterprise
          DEPLOY_BRANCH: main
          DEPLOY_REMOTE: origin
          DEPLOY_FORCE_SYNC: "1"
          DEPLOY_CLEAN_UNTRACKED: "1"
        run: |
          set -euo pipefail
          ./scripts/auto-deploy-live.sh

      - name: Show deploy log on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f /tmp/kalpzero-auto-deploy.log ]]; then
            tail -n 200 /tmp/kalpzero-auto-deploy.log
          else
            echo "No auto-deploy log found at /tmp/kalpzero-auto-deploy.log"
          fi
